name: Gaming4Free Auto Renew

on:
  schedule:
    # 每 6 小时执行一次（UTC 时间）
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install gost (proxy converter)
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          sudo mv gost-linux-amd64-2.11.5 /usr/local/bin/gost

      - name: Start gost proxy (if proxy configured)
        env:
          G4F_SOCKS_PROXY: ${{ secrets.G4F_SOCKS_PROXY }}
        if: ${{ env.G4F_SOCKS_PROXY != '' }}
        run: |
          # 启动 gost 作为后台进程，将带认证的 SOCKS5 转换为本地无认证代理
          nohup gost -L=socks5://127.0.0.1:1080 -F=$G4F_SOCKS_PROXY > /tmp/gost.log 2>&1 &
          sleep 3
          echo "Gost proxy started on 127.0.0.1:1080"
          # 验证 gost 是否运行
          ps aux | grep gost || echo "Warning: gost may not be running"

      - name: Install dependencies
        working-directory: scripts/Gaming4free
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pip install -r requirements.txt -q > /dev/null 2>&1

      - name: Run renewal script
        working-directory: scripts/Gaming4free
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          G4F_SOCKS_PROXY: ${{ secrets.G4F_SOCKS_PROXY }}
          USE_GOST_PROXY: ${{ secrets.G4F_SOCKS_PROXY != '' && 'true' || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: 'true'
          USE_XVFB: 'true'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: scripts/Gaming4free/screenshots/
          if-no-files-found: ignore
          retention-days: 7
