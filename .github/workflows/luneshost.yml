name: Luneshost Auto Login

on:
  # 每周五 UTC 12:00 运行（北京时间 20:00）
  schedule:
    - cron: '0 12 * * 5'
  # 手动触发
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        working-directory: scripts/Luneshost
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq wget
          pip install -r requirements.txt
          seleniumbase install chromedriver

      - name: Setup proxy (gost)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            echo "Setting up gost proxy..."
            wget -O gost.gz https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
            gunzip gost.gz
            chmod +x gost
            
            # 启动 gost 代理
            nohup ./gost -L=:1080 -F="$NODE_LINK" > gost.log 2>&1 &
            
            echo "Waiting 10 seconds for proxy to fully start..."
            sleep 10
            
            if pgrep -f gost > /dev/null; then
              echo "gost is running"
              netstat -tlnp | grep 1080 || echo "Port 1080 not found"
            else
              echo "Warning: gost may not be running"
            fi
          else
            echo "NODE_LINK not set, skipping proxy setup"
          fi

      - name: Run login script
        working-directory: scripts/Luneshost
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IS_PROXY: ${{ secrets.NODE_LINK != '' && 'true' || 'false' }}
          PROXY_SERVER: "http://127.0.0.1:1080"
          HEADLESS: "false"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: scripts/Luneshost/screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup processes
        if: always()
        run: |
          pkill -f gost || true
          pkill -f chromedriver || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          rm -f gost gost.log
